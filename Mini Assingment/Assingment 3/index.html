<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">

        <div class="icon">
           <button class="add-btn">+</button>
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <div class="profile-img">
            <img src="https://www.pmindia.gov.in/wp-content/uploads/2025/12/01.jpg" alt="profile">
        </div>

        <div class="content">
            <h2>Narendra Modi</h2>

            <p>
                Angena gatram, nayanena vaktram, nayena rajyam, lavanena bhojyam
            </p>

            <div class="stacks">
                <div>
                    <h3>72.9M</h3>
                    <span>Likes</span>
                </div>

                <div>
                    <h3>828K</h3>
                    <span>Posts</span>
                </div>

                <div>
                    <h3>342.9M</h3>
                    <span>Views</span>
                </div>
            </div>

            <div class="social-icons">
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-x-twitter"></i>
                <i class="fa-brands fa-threads"></i>
            </div>
        </div>

    </div>

</body>
</html>
