<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Photo Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f2f2;
    padding:30px;
    font-family:Arial, Helvetica, sans-serif;
}
h2{
    justify-self: center;
    align-self: flex-start;
}
.grid-container{
    border: 2px solid red;
    padding: 10px ;
    border-radius: 10px;
    background-color: rgb(248, 112, 112);
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.image-div{
    overflow:hidden;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    background:#fff;
}

.image-div img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
    transition:.5s;
}

.image-div:hover img{
    transform:scale(1.08);
}

</style>

</head>
<body>
    <h2>Responsive Card Layout</h2>

<div class="grid-container">

    <div class="image-div">
        <img src="https://plus.unsplash.com/premium_photo-1781902600925-17f8c97f27ff?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwyN3x8fGVufDB8fHx8fA%3D%3D" alt="">
    </div>

    <div class="image-div">
        <img src="https://images.unsplash.com/photo-1781633237528-d19707220264?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw4OHx8fGVufDB8fHx8fA%3D%3D" alt="">
    </div>

    <div class="image-div">
        <img src="https://images.unsplash.com/photo-1781902835009-a1042ade0cba?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwzMHx8fGVufDB8fHx8fA%3D%3D" alt="">
    </div>

    <div class="image-div">
        <img src="https://images.unsplash.com/photo-1781633237528-d19707220264?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw4OHx8fGVufDB8fHx8fA%3D%3D" alt="">
    </div>

    <div class="image-div">
        <img src="https://images.unsplash.com/photo-1781633237528-d19707220264?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw4OHx8fGVufDB8fHx8fA%3D%3D" alt="">
    </div>

</div>

</body>
</html>
