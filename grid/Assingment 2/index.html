<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #0b0000;
        }
        .nav{
            background-color: #fff;
            padding: 20px;
            text-align: center;
            color: #000;
        }
        .main{
            width: 80%;
            margin: 0 auto;
        }
        .container{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background-color: #fff;
            gap: 10px;
            padding: 10px;
            height: 100vh;
        }
        .item{
            background-color: #130101;
            color: #fff;
            padding: 20px;
            text-align: center;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="nav">
            <h1>Pricing Cards</h1>
            </div>
    
        <div class="container">
            
            <div class="item">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Icon 1" style="width: 50px; height: 50px;">
            </div>
            <div class="item">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Icon 2" style="width: 50px; height: 50px;">
            </div>
            <div class="item">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Icon 3" style="width: 50px; height: 50px;">
            </div>
            
        </div>
        </div>
    </div>
</body>
</html>
