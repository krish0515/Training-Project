<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #0b0000;
        }
        .nav{
            background-color: #fff;
            padding: 20px;
            text-align: center;
            color: #000;
        }
        .main{
            width: 80%;
            margin: 0 auto;
        }
        .container{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background-color: #fff;
            gap: 10px;
            padding: 10px;
            height: 100vh;
        }
        .item{
            background-color: #130101;
            color: #fff;
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="nav">
            <h1>Pricing Cards</h1>
            </div>
    
        <div class="container">
            
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>  
        </div>
        </div>
    </div>
</body>
</html>
